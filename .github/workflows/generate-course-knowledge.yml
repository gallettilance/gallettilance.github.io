name: Generate Course Knowledge

on:
  push:
    branches: [ main ]
    paths:
      - '_modules/**'
      - '_data/faq.yml'
      - '_data/semester.yml'
      - '_staffers/**'
      - 'student_notes/**'
      - '_labs/**'
      - '_lab_solutions/**'
      - 'calendar.md'
      - 'faq.md'
      - 'staff.md'
      - 'final_project.md'
  workflow_dispatch:

jobs:
  generate-knowledge:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install js-yaml gray-matter
        
    - name: Generate Course Knowledge
      run: |
        node scripts/generate-course-knowledge.js
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add course_knowledge.json
        git diff --staged --quiet || git commit -m "🤖 Auto-update course knowledge from site content"
        git push 